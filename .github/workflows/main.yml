name: Generate C4-PlantUML and Publish Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-c4:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate C4-PlantUML from Structurizr DSL
        run: |
          mkdir -p architecture/generated/c4-plantuml

          docker run --rm \
            -v ${{ github.workspace }}:/usr/local/structurizr \
            structurizr/cli export \
            -workspace architecture/workspace.dsl \
            -format plantuml/c4plantuml \
            -output architecture/generated/c4-plantuml

      - name: Show generated files
        run: |
          echo "Generated files:"
          find architecture/generated/c4-plantuml -type f -print || true

      - name: Normalize PlantUML extensions
        run: |
          find architecture/generated/c4-plantuml -type f \( -name "*.plantuml" -o -name "*.puml" \) -print

          count=$(find architecture/generated/c4-plantuml -type f \( -name "*.plantuml" -o -name "*.puml" \) | wc -l)

          if [ "$count" -eq 0 ]; then
            echo "No PlantUML files were generated."
            exit 1
          fi

          for file in architecture/generated/c4-plantuml/*.plantuml; do
            [ -e "$file" ] || continue
            mv "$file" "${file%.plantuml}.puml"
          done

      - name: Render C4-PlantUML to SVG
        run: |
          mkdir -p docs/assets/diagrams/svg

          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            plantuml/plantuml:latest \
            sh -c "find /workspace/architecture/generated/c4-plantuml -name '*.puml' -exec plantuml -tsvg -o /workspace/docs/assets/diagrams/svg {} +"

      - name: Validate generated SVG files
        run: |
          echo "Generated SVG files:"
          find docs/assets/diagrams/svg -type f -name '*.svg' -print

          test -n "$(find docs/assets/diagrams/svg -name '*.svg' -print -quit)"

      - name: Commit generated C4-PlantUML and SVG diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate C4-PlantUML diagrams from Structurizr"
          file_pattern: architecture/generated/c4-plantuml/* docs/assets/diagrams/svg/*.svg

  publish-docs:
    needs: generate-c4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Build MkDocs site
        run: |
          mkdocs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
